---
- name: Install prerequisites
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - software-properties-common
      - wget
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Create keyrings directory
  ansible.builtin.file:
    path: /usr/share/keyrings
    state: directory
    mode: "0755"

- name: Download Grafana GPG key
  ansible.builtin.get_url:
    url: https://apt.grafana.com/gpg.key
    dest: /tmp/grafana.gpg
    mode: "0644"

- name: Convert Grafana key to keyring
  ansible.builtin.command:
    cmd: gpg --dearmor -o /usr/share/keyrings/grafana-archive-keyring.gpg /tmp/grafana.gpg
  args:
    creates: /usr/share/keyrings/grafana-archive-keyring.gpg

- name: Add Grafana repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/grafana-archive-keyring.gpg] https://apt.grafana.com stable main"
    state: present
    filename: grafana

- name: Install grafana
  ansible.builtin.apt:
    name: grafana
    state: present
    update_cache: true

- name: Set admin password
  ansible.builtin.lineinfile:
    path: /etc/grafana/grafana.ini
    regexp: '^;?admin_password\\s*='
    line: "admin_password = {{ grafana_admin_password }}"
  notify: Restart grafana

- name: Enable and start grafana
  ansible.builtin.service:
    name: grafana-server
    state: started
    enabled: true
