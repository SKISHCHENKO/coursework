---
# ВНИМАНИЕ: Реализации nginx log exporter бывают разные.
# Этот role — каркас. Вы можете заменить на конкретный exporter, который парсит access.log/error.log
# и отдаёт метрики в формате Prometheus.

- name: Install python3 (for simple exporter placeholder)
  ansible.builtin.apt:
    name: python3
    state: present
    update_cache: true

- name: Deploy placeholder nginxlog exporter script
  ansible.builtin.copy:
    src: nginxlog_exporter.py
    dest: /usr/local/bin/nginxlog_exporter.py
    mode: "0755"

- name: Create systemd unit for placeholder exporter
  ansible.builtin.template:
    src: nginxlog_exporter.service.j2
    dest: /etc/systemd/system/nginxlog_exporter.service
    mode: "0644"
  notify: Restart nginxlog_exporter

- name: Enable and start nginxlog_exporter
  ansible.builtin.systemd:
    name: nginxlog_exporter
    enabled: true
    state: started
    daemon_reload: true
